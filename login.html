<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | ECore Agents</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <h2>ECore Agents</h2>
        </div>

        <nav aria-label="Navegación principal">
            <a href="index.html#home">Inicio</a>
            <a href="index.html#about">Nosotros</a>
            <a href="catalogo.html">Catálogo</a>
            <a href="cart.html">Carrito <span class="cart-count" aria-label="0 agentes en el carrito">0</span></a>
            <a href="admin.html">Admin</a>
            <a href="index.html#contact">Contacto</a>
            <a href="register.html">Registro</a>
            <a href="login.html" aria-current="page">Iniciar sesión</a>
        </nav>
    </header>

    <main>
        <section class="auth-page">
            <div class="auth-card">
                <h1>Iniciar sesión</h1>
                <form id="login-form" class="auth-form">
                    <label for="login-email">Correo:</label>
                    <input type="email" id="login-email" name="email" autocomplete="email" required>

                    <label for="login-password">Contraseña:</label>
                    <input type="password" id="login-password" name="password" autocomplete="current-password" minlength="6" required>

                    <button type="submit" class="button">Entrar</button>
                    <p id="login-message" class="auth-message" role="status" aria-live="polite"></p>
                </form>

                <p class="auth-link">¿No tienes cuenta? <a href="register.html">Crear una cuenta</a></p>
                <p class="auth-link"><a href="recuperacion.html">¿Olvido su contraseña?</a></p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 ECore. Todos los derechos reservados.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
