<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | ECore Agents</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <h2>ECore Agents</h2>
        </div>

        <nav aria-label="Navegación principal">
            <a href="index.html#home">Inicio</a>
            <a href="index.html#about">Nosotros</a>
            <a href="catalogo.html">Catálogo</a>
            <a href="services.html">Servicios</a>
            <a href="cart.html">Carrito <span class="cart-count" aria-label="0 agentes en el carrito">0</span></a>
            <a href="index.html#contact">Contacto</a>
            <a href="register.html" aria-current="page">Registro</a>
            <a href="login.html">Iniciar sesión</a>
        </nav>
    </header>

    <main>
        <section class="auth-page">
            <div class="auth-card">
                <h1>Crear cuenta</h1>
                <form id="register-form" class="auth-form">
                    <label for="register-name">Nombre:</label>
                    <input type="text" id="register-name" name="name" autocomplete="name" required>

                    <label for="register-email">Correo:</label>
                    <input type="email" id="register-email" name="email" autocomplete="email" required>

                    <label for="register-password">Contraseña:</label>
                    <input type="password" id="register-password" name="password" autocomplete="new-password" minlength="6" required>

                    <button type="submit" class="button">Registrarme</button>
                    <p id="register-message" class="auth-message" role="status" aria-live="polite"></p>
                </form>

                <p class="auth-link">¿Ya tienes cuenta? <a href="login.html">Ir a iniciar sesión</a></p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 ECore. Todos los derechos reservados.</p>
        <p class="footer-policy"><button type="button" class="policy-link" data-policy-open>Políticas y condiciones</button></p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
